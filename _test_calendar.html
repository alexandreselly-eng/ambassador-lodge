  function median(a){ if(!a.length)return null; const s=[...a].sort((x,y)=>x-y); const m=s.length>>1; return s.length%2?s[m]:(s[m-1]+s[m])/2; }

  // explose chaque réservation en nuits {date,bien,rate}
  function nights(rows){ const out=[];
    rows.forEach(r=>{ if(!r.entree||!r.sortie||!r.montant)return; const n=r.nuitees||Math.round((new Date(r.sortie)-new Date(r.entree))/864e5);
      if(!n||n<1)return; const rate=r.montant/n;
      for(let i=0;i<n;i++){ out.push({date:addDays(r.entree,i),bien:r.logement,rate}); } });
    return out; }

  // historique par (bien, semaine) sur années complètes (< année d'anticipation)
  function buildHistory(rows, anticipYear){
    const N=nights(rows);
    const perYear={};   // bien|week|year -> nightsSold
    const rates={};     // bien|week -> [rates] (toutes années < anticip)
    const years=new Set();
    N.forEach(x=>{ const {year,week}=isoWeek(x.date); if(year>=anticipYear)return; years.add(year);
      const yk=x.bien+'|'+week+'|'+year; perYear[yk]=(perYear[yk]||0)+1;
      const rk=x.bien+'|'+week; (rates[rk]=rates[rk]||[]).push(x.rate); });
    const yrs=[...years];
    const stats={}; // bien|week -> {occ, adr, nightsAvg, nYears}
    const biens=[...new Set(N.map(x=>x.bien))];
    biens.forEach(b=>{ for(let w=1;w<=53;w++){ const rk=b+'|'+w;
      const ns=yrs.map(y=>perYear[b+'|'+w+'|'+y]||0); const used=ns.filter((_,i)=>true);
      const nightsAvg=ns.length?ns.reduce((a,c)=>a+c,0)/ns.length:0;
      stats[rk]={occ:Math.min(1,nightsAvg/7), nightsAvg, adr:median(rates[rk]||[]), nYears:yrs.length, samples:(rates[rk]||[]).length}; } });
    return {stats, years:yrs};
  }

  // facteurs explicables
  function occFactor(occ){ if(occ==null)return 1; if(occ<0.3)return 0.9; if(occ<0.6)return 1.0; if(occ<0.85)return 1.1; return 1.2; }
  function ctxFactor(ctx){ let f=1; const why=[];
    if(ctx&&ctx.vacMetro){ f+=0.15; why.push('vacances métropole'); }
    if(ctx&&ctx.vacReunion){ f+=0.10; why.push('vacances Réunion'); }
    if(ctx&&(ctx.ferie||ctx.pont)){ f+=0.10; why.push(ctx.pont?'pont/long week-end':'jour férié'); }
    return {f:Math.min(f,1.5), why}; }

  // prix conseillé pour un (bien, semaine) avec un contexte calendaire
  function suggest(stats, bien, week, ctx){ const st=stats[bien+'|'+week]||{occ:null,adr:null,nightsAvg:0,samples:0};
    const base=st.adr; if(base==null) return {base:null, mid:null, low:null, high:null, occ:st.occ, samples:st.samples, why:['historique insuffisant']};
    const of=occFactor(st.occ); const cf=ctxFactor(ctx);
    const mid=Math.round(base*of*cf.f); const why=[];
    why.push('ADR médian historique '+Math.round(base)+' €');
    if(of>1) why.push('occupation forte (×'+of+')'); else if(of<1) why.push('occupation faible (×'+of+')');
    cf.why.forEach(w=>why.push(w));
    return {base:Math.round(base), mid, low:Math.round(mid*0.9), high:Math.round(mid*1.12), occ:st.occ, samples:st.samples, factor:Math.round(of*cf.f*100)/100, why}; }

  // grille hebdo pour une année d'anticipation
  function grid(rows, anticipYear, holCtx){ const {stats,years}=buildHistory(rows, anticipYear);
    const biens=[...new Set(rows.map(r=>r.logement).filter(Boolean))]; const out=[];
    biens.forEach(b=>{ for(let w=1;w<=52;w++){
      // date de référence = jeudi de la semaine w de anticipYear
      const jan4=new Date(Date.UTC(anticipYear,0,4)); const day=(jan4.getUTCDay()+6)%7;
      const week1Mon=new Date(jan4); week1Mon.setUTCDate(jan4.getUTCDate()-day);
      const thu=new Date(week1Mon); thu.setUTCDate(week1Mon.getUTCDate()+(w-1)*7+3);
      const dRef=thu.toISOString().slice(0,10);
      const ctx=holCtx?holCtx(dRef):{};
      out.push(Object.assign({bien:b, week:w, dateRef:dRef, ctx}, suggest(stats,b,w,ctx)));
    }});
    return {grid:out, years, stats}; }

  // trous de remplissage récurrents (occupation historique faible)
  function recurringVacancy(stats, threshold){ threshold=threshold==null?0.35:threshold; const out=[];
    Object.keys(stats).forEach(k=>{ const st=stats[k]; if(st.samples>0 && st.occ!=null && st.occ<threshold){ const [bien,week]=k.split('|'); out.push({bien,week:+week,occ:st.occ,adr:st.adr}); } });

  return {isoWeek,nights,buildHistory,suggest,grid,recurringVacancy,occFactor,ctxFactor,_median:median};
})();

</script><script>// ===== Onglet Calendrier location courte durée (présentation type Airbnb) =====
const AL_CAL = (function(){
  const DAY=864e5;
  const MOISL=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const DOW=['L','M','M','J','V','S','D'];
  const CHAN={Airbnb:'#ff5a5f',Booking:'#003580','Site web':'#3fb950',Direct:'#d4af37',Immosphera:'#bc8cff',Bibizfamily:'#58a6ff',Abritel:'#e3893b','Direct FM':'#f1d27a'};
  function chanColor(o){ return CHAN[o]||(typeof CHAN_COLORS!=='undefined'&&CHAN_COLORS[o])||'#8b97a8'; }
  const _eur=(typeof eur==='function')?eur:(n=>n==null?'—':Math.round(n).toLocaleString('fr-FR')+' €');
  function ymd(d){return d.toISOString().slice(0,10);}
  function addDays(s,n){const d=new Date(s+'T00:00:00Z');d.setUTCDate(d.getUTCDate()+n);return ymd(d);}
  function diffDays(a,b){return Math.round((new Date(b+'T00:00:00Z')-new Date(a+'T00:00:00Z'))/DAY);}
  function fd(s){if(!s)return '—';const[y,m,d]=s.split('-');return `${d}/${m}/${y.slice(2)}`;}
  function daysInMonth(y,m){return new Date(Date.UTC(y,m+1,0)).getUTCDate();}

  let st={view:'month', year:null, month:null, bien:null, zones:{'Réunion':true,'A':false,'B':false,'C':true}, holReady:false};
  let LU={}, PONT=new Set(); // prix par (bien|semaine), dates de pont

  function rows(){ return (typeof ROWS!=='undefined'?ROWS:[]).filter(r=>r.entree&&r.sortie); }
  function biens(){ const b=[...new Set(rows().map(r=>r.logement).filter(Boolean))].sort(); return b.length?b:['Ambassador','Lodge']; }
  function resaInRange(bien,start,end){ return rows().filter(r=>r.logement===bien && r.entree<end && r.sortie>start); }
  function leadTime(r){ return r.date_resa? diffDays(r.date_resa,r.entree): null; }
  function adr(r){ const n=r.nuitees||diffDays(r.entree,r.sortie); return n? r.montant/n : null; }
  function reste(r){ const z=v=>v||0; return r.reste_a_payer!=null?r.reste_a_payer:(z(r.montant)+z(r.taxe)-z(r.ac1)-z(r.ac2)-z(r.ac3)-z(r.frais_menage)); }
  function activeZones(){ return Object.keys(st.zones).filter(z=>st.zones[z]); }
  function dayVac(d){ if(typeof AL_HOL==='undefined')return {reu:false,met:false};
    const z=activeZones(); const reuZ=z.filter(x=>x==='Réunion'), metZ=z.filter(x=>x!=='Réunion');
    return {reu:reuZ.length?AL_HOL.inVacation(d,reuZ).length>0:false, met:metZ.length?AL_HOL.inVacation(d,metZ).length>0:false}; }
  function holCtx(d){ if(typeof AL_HOL==='undefined')return {};
    const v=dayVac(d); return {vacMetro:v.met, vacReunion:v.reu, ferie:AL_HOL.isFerie(d,'reunion'), pont:PONT.has(d)}; }

  // ---- préparation prix (par semaine, pour l'année affichée) ----
  function buildPrice(){ LU={}; if(typeof AL_PRICE==='undefined')return;
    try{ const G=AL_PRICE.grid(rows(),st.year,holCtx); G.grid.forEach(g=>{ LU[g.bien+'|'+g.week]=g; }); G._years=G.years; AL_CAL._priceYears=G.years; }catch(e){}
    PONT=new Set(); if(typeof AL_HOL!=='undefined'){ AL_HOL.ponts('reunion').forEach(p=>PONT.add(p.date)); } }
  function priceCell(d,bien){ if(typeof AL_PRICE==='undefined')return null; const w=AL_PRICE.isoWeek(d).week; const g=LU[bien+'|'+w]; return g?g.mid:null; }

  // ---------- une grille de mois ----------
  function monthGrid(y,m,bien,size){
    const dim=daysInMonth(y,m); const lead=(new Date(Date.UTC(y,m,1)).getUTCDay()+6)%7;
    const today=ymd(new Date());
    const cells=[]; for(let i=0;i<lead;i++)cells.push(null); for(let d=1;d<=dim;d++)cells.push(ymd(new Date(Date.UTC(y,m,d)))); while(cells.length%7)cells.push(null);
    const weeks=[]; for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
    const mStart=ymd(new Date(Date.UTC(y,m,1))), mEnd=ymd(new Date(Date.UTC(y,m+1,1)));
    const resas=resaInRange(bien,mStart,mEnd);
    // jours bookés (pour masquer le prix)
    const booked=new Set(); resas.forEach(r=>{ for(let d=r.entree; d<r.sortie; d=addDays(d,1)) booked.add(d); });

    let h=`<div class="mg ${size}"><div class="mgttl">${MOISL[m].toLowerCase()} <span class="mgyr">${y}</span></div>`;
    h+='<div class="mgdow">'+DOW.map(x=>`<span>${x}</span>`).join('')+'</div>';
    weeks.forEach(wk=>{
      // cellules
      const wkDays=wk.filter(Boolean);
      let days='';
      wk.forEach(d=>{ if(!d){ days+='<div class="mgday empty"></div>'; return; }
        const past=d<today, fer=(typeof AL_HOL!=='undefined')&&AL_HOL.isFerie(d,'reunion'), pont=PONT.has(d), v=dayVac(d);
        const price=priceCell(d,bien); const showP=price!=null && !booked.has(d);
        const cls=['mgday',past?'past':'',fer?'fer':'',pont?'pont':'',v.reu?'vreu':'',v.met?'vmet':''].filter(Boolean).join(' ');
        const ttl=fer?AL_HOL.ferieName(d,'reunion'):pont?'Pont / long week-end':(v.reu?'Vacances scolaires Réunion':v.met?'Vacances scolaires métropole':'');
        let badge=''; if(fer)badge=`<span class="mgbadge f" title="${AL_HOL.ferieName(d,'reunion')||''}">F</span>`; else if(pont)badge='<span class="mgbadge p">Pont</span>';
        days+=`<div class="${cls}" title="${ttl}"><div class="mgtop"><span class="mgnum">${+d.slice(8)}</span>${badge}</div>`+
          `<div class="mgprice">${showP?price+' €':''}</div></div>`; });
      // bandeau vacances (haut de semaine)
      let rib='';
      if(wkDays.length){
        const segs=fn=>{ const o=[]; let run=null; wk.forEach((d,i)=>{ const on=d?fn(d):false; if(on){ if(!run)run={a:i,b:i}; else run.b=i; } else if(run){o.push(run);run=null;} }); if(run)o.push(run); return o; };
        segs(d=>dayVac(d).reu).forEach(s=>{ rib+=`<div class="rbar reu" style="left:${s.a/7*100}%;width:${(s.b-s.a+1)/7*100}%" title="Vacances scolaires Réunion"></div>`; });
        segs(d=>dayVac(d).met).forEach(s=>{ rib+=`<div class="rbar met" style="left:${s.a/7*100}%;width:${(s.b-s.a+1)/7*100}%" title="Vacances scolaires métropole"></div>`; });
      }
      // réservations de la semaine
      let bars=''; if(wkDays.length){ const wkStart=wkDays[0], wkEnd=wkDays[wkDays.length-1];
        resas.forEach(r=>{ const cs=r.entree>wkStart?r.entree:wkStart; const lastNight=addDays(r.sortie,-1); const ce=lastNight<wkEnd?lastNight:wkEnd;
          if(cs>ce) return; const a=wk.indexOf(cs), b=wk.indexOf(ce); if(a<0||b<0) return;
          const left=a/7*100, width=(b-a+1)/7*100; const rl=(cs===r.entree), rr=(ce===lastNight);
          const col=chanColor(r.origine); const nm=((r.prenom||r.nom||'').trim()); const init=(nm[0]||'?').toUpperCase();
          const extra=r.nb_pers?' +'+r.nb_pers:'';
          bars+=`<div class="mgresa ${rl?'rl':''} ${rr?'rr':''}" style="left:${left}%;width:${width}%" data-k="${(r.logement||'')+'|'+r.entree+'|'+(r.nom||'')}">`+
            (rl?`<span class="mgav" style="background:${col}">${init}</span><span class="mgnm">${nm}${extra}</span>`:'')+`</div>`; });
      }
      h+=`<div class="mgweek"><div class="mgribbon">${rib}</div><div class="mgdays">${days}</div><div class="mgbars">${bars}</div></div>`;
    });
    h+='</div>';
    return h;
  }

  // ---------- contrôles ----------
  function controls(){
    const lab = st.view==='year'? String(st.year) : st.view==='quarter'? ('T'+(Math.floor(st.month/3)+1)+' '+st.year) : (MOISL[st.month]+' '+st.year);
    const seg=(id,opts,cur)=>`<div class="seg" id="${id}">`+opts.map(o=>`<button data-v="${o[0]}" class="${o[0]===cur?'on':''}">${o[1]}</button>`).join('')+'</div>';
    const zchk=z=>`<label class="calz"><input type="checkbox" data-z="${z}" ${st.zones[z]?'checked':''}> ${z==='Réunion'?'Réunion':'Métro '+z}</label>`;
    return `<div class="calctrls">
      ${seg('calViewSeg',[['month','Mois'],['quarter','Trimestre'],['year','Année']],st.view)}
      <div class="calnav"><button id="calPrev">‹</button><span id="calLabel">${lab}</span><button id="calNext">›</button><button id="calToday">Aujourd'hui</button></div>
      ${seg('calBienSeg',biens().map(b=>[b,b]),st.bien)}
      <div class="calzones">Vacances : ${['Réunion','A','B','C'].map(zchk).join('')}</div>
    </div><div class="callegend" id="calLegend"></div>`;
  }
  function legend(){ const items=[['Réservation','#3a4150'],['Vac. Réunion','#10c8ec'],['Vac. métropole','#d06bff'],['Férié','var(--red)'],['Pont','var(--orange)']];
    return items.map(i=>`<span class="lgi"><span class="dot" style="background:${i[1]}"></span>${i[0]}</span>`).join(''); }

  // ---------- panneau prix ----------
  function pricingPanel(){ if(typeof AL_PRICE==='undefined')return ''; const y=st.year; const b=st.bien;
    let wMin=1,wMax=52;
    if(st.view==='month'){ const c=AL_PRICE.isoWeek(ymd(new Date(Date.UTC(y,st.month,15)))).week; wMin=Math.max(1,c-1); wMax=Math.min(52,c+4); }
    else if(st.view==='quarter'){ const q=Math.floor(st.month/3); wMin=AL_PRICE.isoWeek(ymd(new Date(Date.UTC(y,q*3,5)))).week; wMax=AL_PRICE.isoWeek(ymd(new Date(Date.UTC(y,q*3+2,25)))).week; }
    let rowsH='';
    for(let w=wMin;w<=wMax;w++){ const g=LU[b+'|'+w]; if(!g)continue;
      const tags=[]; if(g.ctx&&g.ctx.vacMetro)tags.push('<span class="ptag met">Vac. métro</span>'); if(g.ctx&&g.ctx.vacReunion)tags.push('<span class="ptag reu">Vac. Réú</span>'); if(g.ctx&&g.ctx.ferie)tags.push('<span class="ptag fer">Férié</span>'); if(g.ctx&&g.ctx.pont)tags.push('<span class="ptag pont">Pont</span>');
      const occ=g.occ!=null?Math.round(g.occ*100)+'%':'—'; const prix=g.mid!=null?`<b>${g.mid} €</b> <span class="prange">(${g.low}–${g.high})</span>`:'<span class="muted">hist. insuffisant</span>';
      rowsH+=`<tr><td>S${w}<br><span class="muted">${fd(g.dateRef)}</span></td><td>${occ}</td><td>${g.base?g.base+' €':'—'}</td><td>${prix}</td><td>${tags.join(' ')||'<span class="muted">—</span>'}</td></tr>`; }
    return `<div class="card calpcard"><h3>Prix conseillés à programmer — <span class="pill ${b==='Ambassador'?'amb':'lodge'}">${b}</span> <span class="hint">base historique ${(AL_CAL._priceYears||[]).join(', ')||'—'}</span></h3>

      <div class="scroll" style="max-height:320px"><table class="tbl calptbl"><thead><tr><th>Semaine</th><th>Occ. hist.</th><th>ADR médian</th><th>Prix conseillé /nuit</th><th>Contexte</th></tr></thead><tbody>${rowsH||'<tr><td colspan="5" class="muted" style="padding:12px">Historique insuffisant.</td></tr>'}</tbody></table></div></div>`;
  }

  // ---------- rendu ----------
  function render(){
    if(st.year==null){ const t=new Date(); st.year=t.getUTCFullYear(); st.month=t.getUTCMonth(); }
    if(!st.bien) st.bien=biens()[0];
    buildPrice();
    const ctrl=document.getElementById('calControls'); if(ctrl)ctrl.innerHTML=controls();
    const lg=document.getElementById('calLegend'); if(lg)lg.innerHTML=legend();
    const body=document.getElementById('calBody');
    if(body){ const b=st.bien;
      if(st.view==='month'){ body.innerHTML=`<div class="mggrid one">${monthGrid(st.year,st.month,b,'lg')}</div>`; }
      else if(st.view==='quarter'){ const q=Math.floor(st.month/3); let g=''; for(let i=0;i<3;i++)g+=monthGrid(st.year,q*3+i,b,'sm'); body.innerHTML=`<div class="mggrid three">${g}</div>`; }
      else { let g=''; for(let m=0;m<12;m++)g+=monthGrid(st.year,m,b,'sm'); body.innerHTML=`<div class="mggrid three">${g}</div>`; }
    }
    const pp=document.getElementById('calPricing'); if(pp)pp.innerHTML=pricingPanel();

  }

  function step(dir){ if(st.view==='month'){ st.month+=dir; if(st.month>11){st.month=0;st.year++;} if(st.month<0){st.month=11;st.year--;} }
    else if(st.view==='quarter'){ st.month+=dir*3; while(st.month>11){st.month-=12;st.year++;} while(st.month<0){st.month+=12;st.year--;} }
    else st.year+=dir; render(); }
  function tip(html,x,y){ const t=document.getElementById('calTip'); if(!t)return; t.innerHTML=html; t.style.display='block';

    return `<div class="ttl"><span class="pill ${r.logement==='Ambassador'?'amb':'lodge'}">${r.logement}</span> ${(r.prenom||'')+' '+(r.nom||'')}</div>
      <table class="cttab">
      <tr><td>Séjour</td><td>${fd(r.entree)} → ${fd(r.sortie)} (${r.nuitees||diffDays(r.entree,r.sortie)} nuits)</td></tr>
      <tr><td>Montant versé</td><td>${_eur(r.montant)}</td></tr><tr><td>ADR /nuit</td><td>${a?_eur(a):'—'}</td></tr>
      <tr><td>Canal / apporteur</td><td>${r.origine||'—'}</td></tr><tr><td>Taxe séjour</td><td>${_eur(r.taxe)}</td></tr>
      <tr><td>Ménage</td><td>${_eur(r.frais_menage)}</td></tr><tr><td>Voyageurs</td><td>${r.nb_pers||'—'}</td></tr>
      <tr><td>Réservé le</td><td>${fd(r.date_resa)} ${lt!=null?'('+lt+' j avant)':''}</td></tr><tr><td>Reste à payer</td><td>${_eur(reste(r))}</td></tr></table>`; }
  function wire(){
    const vs=document.getElementById('calViewSeg'); if(vs)vs.querySelectorAll('button').forEach(b=>b.onclick=()=>{st.view=b.dataset.v;render();});
    const bn=document.getElementById('calBienSeg'); if(bn)bn.querySelectorAll('button').forEach(b=>b.onclick=()=>{st.bien=b.dataset.v;render();});
    const p=document.getElementById('calPrev'); if(p)p.onclick=()=>step(-1);
    const n=document.getElementById('calNext'); if(n)n.onclick=()=>step(1);
    const td=document.getElementById('calToday'); if(td)td.onclick=()=>{const t=new Date();st.year=t.getUTCFullYear();st.month=t.getUTCMonth();render();};
    document.querySelectorAll('#calControls input[data-z]').forEach(c=>c.onchange=()=>{st.zones[c.dataset.z]=c.checked;render();});
    document.querySelectorAll('#calBody .mgresa').forEach(el=>{ const k=el.dataset.k; const r=rows().find(x=>((x.logement||'')+'|'+x.entree+'|'+(x.nom||''))===k);
      if(r){ el.onmousemove=e=>tip(resaTip(r),e.clientX,e.clientY); el.onmouseleave=hideTip; } });
  }
  async function init(){ if(st.holReady){render();return;}
    render();
    if(typeof AL_HOL!=='undefined'){ const t=new Date().getUTCFullYear(); try{ await AL_HOL.load([t-2,t-1,t,t+1],{fallback:(typeof AL_HOL_FALLBACK!=='undefined'?AL_HOL_FALLBACK:null)}); }catch(e){} }

  }

})();
function renderCalendar(){ AL_CAL.init(); }
if(typeof module!=='undefined') module.exports=AL_CAL;
